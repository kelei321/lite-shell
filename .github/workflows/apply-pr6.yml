name: Apply PR6 recursive safety patch

on:
  push:
    branches:
      - fix/sftp-recursive-transfer-safety
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          ref: fix/sftp-recursive-transfer-safety
          fetch-depth: 0
      - name: Apply PR6 patch
        id: apply
        shell: pwsh
        run: |
          python scripts/apply_pr6.py *> pr6-patch.log
          $code = $LASTEXITCODE
          Get-Content pr6-patch.log | Select-Object -Last 40
          "exit_code=$code" >> $env:GITHUB_OUTPUT
          exit 0
      - name: Upload patch diagnostic
        if: steps.apply.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: pr6-patch-diagnostic
          path: pr6-patch.log
          retention-days: 1
      - name: Stop after patch failure
        if: steps.apply.outputs.exit_code != '0'
        run: exit 1
      - name: Set up Rust formatter
        if: steps.apply.outputs.exit_code == '0'
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
      - name: Format Rust sources
        if: steps.apply.outputs.exit_code == '0'
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all
      - name: Commit implementation
        if: steps.apply.outputs.exit_code == '0'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: secure recursive SFTP scans"
          git push origin HEAD:fix/sftp-recursive-transfer-safety
