name: Apply PR7 follow-up

on:
  pull_request:
    branches:
      - main
    types:
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v5
        with:
          ref: feat/sftp-safe-resume-checkpoint
          fetch-depth: 0

      - name: Apply focused follow-up
        run: python scripts/apply_pr7_followup.py

      - name: Set up Rust formatter
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - name: Format Rust sources
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all

      - name: Commit patched sources
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: refresh and validate SFTP checkpoints"
          git push origin HEAD:feat/sftp-safe-resume-checkpoint
