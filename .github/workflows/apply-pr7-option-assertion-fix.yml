name: Apply PR7 Option assertion fix

on:
  push:
    branches:
      - feat/sftp-safe-resume-checkpoint
  pull_request:
    branches:
      - main
    types:
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feat/sftp-safe-resume-checkpoint
          fetch-depth: 0
      - name: Fix Option assertion
        shell: pwsh
        run: |
          $path = 'src-tauri/src/sftp.rs'
          $content = Get-Content $path -Raw
          $old = @'
            manager.acquire_task("task-a").err().map(|error| error.code),
            "TRANSFER_TASK_BUSY"
'@
          $new = @'
            manager.acquire_task("task-a").err().map(|error| error.code),
            Some("TRANSFER_TASK_BUSY")
'@
          $oldValue = $old.TrimStart("`r", "`n")
          $newValue = $new.TrimStart("`r", "`n")
          if (-not $content.Contains($oldValue)) { throw 'Task lock Option assertion not found' }
          Set-Content -Path $path -Value ($content.Replace($oldValue, $newValue)) -NoNewline
          Remove-Item '.github/workflows/apply-pr7-option-assertion-fix.yml'
      - name: Set up Rust formatter
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
      - name: Format Rust sources
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all
      - name: Commit fix
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: compare transfer task lock Option"
          git push origin HEAD:feat/sftp-safe-resume-checkpoint
