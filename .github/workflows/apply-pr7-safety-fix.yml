name: Apply PR7 safety fix

on:
  push:
    branches:
      - feat/sftp-safe-resume-checkpoint
  pull_request:
    branches:
      - main
    types:
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v5
        with:
          ref: feat/sftp-safe-resume-checkpoint
          fetch-depth: 0

      - name: Repair patch script escaping
        run: python scripts/fix_pr7_script_escape.py

      - name: Apply focused safety patch
        id: apply
        shell: pwsh
        run: |
          python scripts/apply_pr7_safety_fix.py *> pr7-fix.log
          $code = $LASTEXITCODE
          Get-Content pr7-fix.log | Select-Object -Last 30
          "exit_code=$code" >> $env:GITHUB_OUTPUT
          exit 0

      - name: Upload patch diagnostic
        if: steps.apply.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: pr7-fix-diagnostic
          path: pr7-fix.log
          retention-days: 1

      - name: Stop after patch failure
        if: steps.apply.outputs.exit_code != '0'
        shell: pwsh
        run: exit 1

      - name: Set up Rust formatter
        if: steps.apply.outputs.exit_code == '0'
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - name: Format Rust sources
        if: steps.apply.outputs.exit_code == '0'
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all

      - name: Commit patched sources
        if: steps.apply.outputs.exit_code == '0'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if (git diff --cached --quiet) {
            Write-Host "No changes to commit"
            exit 0
          }
          git commit -m "fix: bind SFTP checkpoints to verified sessions"
          git push origin HEAD:feat/sftp-safe-resume-checkpoint
