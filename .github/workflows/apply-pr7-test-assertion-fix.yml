name: Apply PR7 task lock test fix

on:
  pull_request:
    branches:
      - main
    types:
      - reopened

permissions:
  contents: write

jobs:
  apply:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feat/sftp-safe-resume-checkpoint
          fetch-depth: 0
      - name: Fix task lock error assertion
        shell: pwsh
        run: |
          $path = 'src-tauri/src/sftp.rs'
          $content = Get-Content $path -Raw
          $content = $content.Replace("#[derive(Debug)]`r`nstruct TransferTaskGuard<'a> {", "struct TransferTaskGuard<'a> {")
          $content = $content.Replace("#[derive(Debug)]`nstruct TransferTaskGuard<'a> {", "struct TransferTaskGuard<'a> {")
          $old = @'
        assert_eq!(
            manager.acquire_task("task-a").unwrap_err().code,
            "TRANSFER_TASK_BUSY"
        );
'@
          $new = @'
        assert_eq!(
            manager.acquire_task("task-a").err().map(|error| error.code),
            Some("TRANSFER_TASK_BUSY")
        );
'@
          if (-not $content.Contains($old.TrimStart("`r", "`n"))) { throw 'Task lock assertion not found' }
          $content = $content.Replace($old.TrimStart("`r", "`n"), $new.TrimStart("`r", "`n"))
          Set-Content -Path $path -Value $content -NoNewline
          Remove-Item '.github/workflows/apply-pr7-test-assertion-fix.yml'
      - name: Set up Rust formatter
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
      - name: Format Rust sources
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all
      - name: Commit fix
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: assert transfer task lock without Debug"
          git push origin HEAD:feat/sftp-safe-resume-checkpoint
