name: Apply PR7 directory conflict strategies

on:
  push:
    branches:
      - feat/sftp-directory-conflict-strategies
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feat/sftp-directory-conflict-strategies
          fetch-depth: 0
      - name: Validate patch scripts
        run: python -m py_compile scripts/pre_fix_apply_pr7.py scripts/fix_apply_pr7.py scripts/apply_pr7.py
      - name: Apply preflight patches
        run: python scripts/pre_fix_apply_pr7.py
      - name: Harden implementation script
        run: python scripts/fix_apply_pr7.py
      - name: Validate hardened script
        run: python -m py_compile scripts/apply_pr7.py
      - name: Apply PR7 implementation
        id: apply
        shell: pwsh
        run: |
          python scripts/apply_pr7.py *> pr7-patch.log
          $code = $LASTEXITCODE
          Get-Content pr7-patch.log | Select-Object -Last 60
          "exit_code=$code" >> $env:GITHUB_OUTPUT
          exit 0
      - name: Upload patch diagnostic
        if: steps.apply.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: pr7-patch-diagnostic
          path: pr7-patch.log
          retention-days: 1
      - name: Stop after patch failure
        if: steps.apply.outputs.exit_code != '0'
        run: exit 1
      - name: Set up Rust formatter
        if: steps.apply.outputs.exit_code == '0'
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
      - name: Format Rust sources
        if: steps.apply.outputs.exit_code == '0'
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all
      - name: Commit implementation
        if: steps.apply.outputs.exit_code == '0'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: clarify directory conflict strategies"
          git push origin HEAD:feat/sftp-directory-conflict-strategies
