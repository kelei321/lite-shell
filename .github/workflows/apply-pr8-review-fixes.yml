name: Apply PR8 review fixes

on:
  push:
    branches:
      - fix/sftp-recursive-transfer-safety
  pull_request:
    branches:
      - main
    types:
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          ref: fix/sftp-recursive-transfer-safety
          fetch-depth: 0
      - name: Apply review fixes
        run: python scripts/apply_pr8_review_fixes.py
      - name: Set up Rust formatter
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
      - name: Format Rust sources
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all
      - name: Commit review fixes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: address recursive scan review findings"
          git push origin HEAD:fix/sftp-recursive-transfer-safety
