name: Apply PR9 safe local cleanup

on:
  push:
    branches:
      - feat/sftp-directory-conflict-strategies
  pull_request:
    branches:
      - main
    types:
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feat/sftp-directory-conflict-strategies
          fetch-depth: 0
      - name: Apply safe cleanup patch
        run: python scripts/apply_pr9_safe_local_cleanup.py
      - name: Set up Rust formatter
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
      - name: Format Rust sources
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all
      - name: Commit implementation
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: avoid following local links during replacement cleanup"
          git push origin HEAD:feat/sftp-directory-conflict-strategies
