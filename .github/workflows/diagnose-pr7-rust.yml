name: Diagnose PR7 Rust

on:
  pull_request:
    branches:
      - main
    types:
      - reopened

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feat/sftp-safe-resume-checkpoint
      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Capture Rust test output
        id: tests
        shell: pwsh
        run: |
          cargo test --manifest-path src-tauri/Cargo.toml --all-targets --all-features *> rust-test.log
          $code = $LASTEXITCODE
          Get-Content rust-test.log | Select-Object -Last 120 | Set-Content rust-test-tail.log
          "exit_code=$code" >> $env:GITHUB_OUTPUT
          exit 0
      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: pr7-rust-diagnostic
          path: rust-test-tail.log
          retention-days: 1
      - name: Fail when tests fail
        if: steps.tests.outputs.exit_code != '0'
        run: exit 1
