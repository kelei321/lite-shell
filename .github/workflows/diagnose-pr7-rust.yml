name: Apply PR7 Rust import fix

on:
  pull_request:
    branches:
      - main
    types:
      - reopened

permissions:
  contents: write

jobs:
  apply:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feat/sftp-safe-resume-checkpoint
          fetch-depth: 0
      - name: Add missing Tokio seek trait import
        shell: pwsh
        run: |
          $path = 'src-tauri/src/sftp.rs'
          $content = Get-Content $path -Raw
          $old = 'io::{AsyncRead, AsyncReadExt, AsyncSeekExt, AsyncWrite, AsyncWriteExt},'
          $new = 'io::{AsyncRead, AsyncReadExt, AsyncSeek, AsyncSeekExt, AsyncWrite, AsyncWriteExt},'
          if (-not $content.Contains($old)) { throw 'Expected Tokio import not found' }
          Set-Content -Path $path -Value ($content.Replace($old, $new)) -NoNewline
          Remove-Item '.github/workflows/diagnose-pr7-rust.yml'
      - name: Set up Rust formatter
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
      - name: Format Rust sources
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all
      - name: Commit fix
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: import Tokio async seek trait"
          git push origin HEAD:feat/sftp-safe-resume-checkpoint
