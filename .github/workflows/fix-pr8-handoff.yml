name: Fix PR8 handoff

on:
  push:
    branches:
      - fix/sftp-recursive-transfer-safety
  pull_request:
    branches:
      - main
    types:
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          ref: fix/sftp-recursive-transfer-safety
          fetch-depth: 0
      - name: Update handoff
        run: python scripts/fix_pr8_handoff.py
      - name: Commit handoff update
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: update PR6 handoff context"
          git push origin HEAD:fix/sftp-recursive-transfer-safety
