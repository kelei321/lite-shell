name: PR10 Apply Checkpoint Truth

on:
  pull_request:
    types: [reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.number == 10
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v5
        with:
          ref: feat/sftp-transfer-queue
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.16.0
          cache: npm

      - name: Set up Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Fix patch path escaping
        shell: pwsh
        run: |
          $path = "scripts/apply_pr10_checkpoint_truth.py"
          $content = Get-Content $path -Raw
          $old = 'source_path: format!("C:\\{id}.txt"),'
          $new = 'source_path: format!("C:\\\\{id}.txt"),'
          if (-not $content.Contains($old)) { throw "checkpoint test path pattern not found" }
          Set-Content -Path $path -Value $content.Replace($old, $new) -Encoding utf8

      - name: Preserve recursive scan cancellation wrapper
        shell: pwsh
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python scripts/fix_pr10_checkpoint_patch.py

      - name: Apply checkpoint truth patch
        shell: pwsh
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python scripts/apply_pr10_checkpoint_truth.py

      - name: Format Rust
        shell: pwsh
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all

      - name: Install dependencies
        run: npm ci

      - name: Capture frontend validation
        id: frontend
        shell: pwsh
        run: |
          $code = 0
          npm run test:frontend *> frontend-validation.log
          if ($LASTEXITCODE -ne 0) { $code = $LASTEXITCODE }
          if ($code -eq 0) {
            npm run typecheck *>> frontend-validation.log
            if ($LASTEXITCODE -ne 0) { $code = $LASTEXITCODE }
          }
          if ($code -eq 0) {
            npm run build *>> frontend-validation.log
            if ($LASTEXITCODE -ne 0) { $code = $LASTEXITCODE }
          }
          Get-Content frontend-validation.log -Tail 240 | Set-Content frontend-validation-tail.txt
          "exit_code=$code" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          exit 0

      - name: Upload frontend validation log
        uses: actions/upload-artifact@v4
        with:
          name: pr10-frontend-validation-tail
          path: frontend-validation-tail.txt
          if-no-files-found: error

      - name: Validate Rust
        if: steps.frontend.outputs.exit_code == '0'
        shell: pwsh
        run: |
          cargo test --manifest-path src-tauri/Cargo.toml --all-targets --all-features
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D clippy::correctness -D clippy::suspicious
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Remove temporary files
        if: steps.frontend.outputs.exit_code == '0'
        shell: pwsh
        run: |
          Remove-Item scripts/apply_pr10_checkpoint_truth.py -Force
          Remove-Item scripts/fix_pr10_checkpoint_patch.py -Force
          Remove-Item .github/workflows/pr10-apply-checkpoint-truth.yml -Force

      - name: Commit and push
        if: steps.frontend.outputs.exit_code == '0'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Output "No changes to commit"
            exit 0
          }
          git commit -m "fix: derive queue state from real checkpoints"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          git push origin HEAD:feat/sftp-transfer-queue
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Preserve frontend validation failure
        if: steps.frontend.outputs.exit_code != '0'
        run: exit 1
