name: PR10 Apply Queue Bridge

on:
  pull_request:
    types: [reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.number == 10
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v5
        with:
          ref: feat/sftp-transfer-queue
          fetch-depth: 0

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - name: Apply queue bridge patch
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python scripts/apply_pr10_queue_bridge.py

      - name: Format Rust
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all

      - name: Remove temporary files
        run: rm -f scripts/apply_pr10_queue_bridge.py .github/workflows/pr10-apply-queue-bridge.yml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "feat: bridge secure transfers into backend queue"
          git push origin HEAD:feat/sftp-transfer-queue
