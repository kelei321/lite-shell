name: PR11 Apply Navigation

on:
  pull_request:
    types: [reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.number == 11
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v5
        with:
          ref: feat/sftp-navigation-batch-operations
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.16.0
          cache: npm

      - name: Set up Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Fix clipboard newline escaping
        shell: pwsh
        run: |
          $path = "scripts/apply_pr11_navigation.py"
          $content = Get-Content $path -Raw
          $old = 'join("\n")'
          $new = 'join("\\n")'
          if (-not $content.Contains($old)) { throw "clipboard join pattern not found" }
          Set-Content -Path $path -Value $content.Replace($old, $new) -Encoding utf8

      - name: Apply navigation patch
        shell: pwsh
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python scripts/apply_pr11_navigation.py

      - name: Format Rust
        shell: pwsh
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all

      - name: Install dependencies
        run: npm ci

      - name: Capture frontend validation
        id: frontend
        shell: pwsh
        run: |
          $code = 0
          npm run test:frontend *> frontend-validation.log
          if ($LASTEXITCODE -ne 0) { $code = $LASTEXITCODE }
          if ($code -eq 0) {
            npm run typecheck *>> frontend-validation.log
            if ($LASTEXITCODE -ne 0) { $code = $LASTEXITCODE }
          }
          if ($code -eq 0) {
            npm run build *>> frontend-validation.log
            if ($LASTEXITCODE -ne 0) { $code = $LASTEXITCODE }
          }
          Get-Content frontend-validation.log -Tail 260 | Set-Content frontend-validation-tail.txt
          "exit_code=$code" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          exit 0

      - name: Upload frontend validation log
        uses: actions/upload-artifact@v4
        with:
          name: pr11-frontend-validation-tail
          path: frontend-validation-tail.txt
          if-no-files-found: error

      - name: Validate Rust
        if: steps.frontend.outputs.exit_code == '0'
        shell: pwsh
        run: |
          cargo test --manifest-path src-tauri/Cargo.toml --all-targets --all-features
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D clippy::correctness -D clippy::suspicious
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Remove temporary files
        if: steps.frontend.outputs.exit_code == '0'
        shell: pwsh
        run: |
          Remove-Item scripts/apply_pr11_navigation.py -Force
          Remove-Item .github/workflows/pr11-apply-navigation.yml -Force
          Remove-Item frontend-validation.log, frontend-validation-tail.txt -Force

      - name: Commit and push
        if: steps.frontend.outputs.exit_code == '0'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Output "No changes to commit"
            exit 0
          }
          git commit -m "feat: complete SFTP navigation and batch operations"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          git push origin HEAD:feat/sftp-navigation-batch-operations
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Preserve frontend validation failure
        if: steps.frontend.outputs.exit_code != '0'
        shell: pwsh
        run: exit 1
