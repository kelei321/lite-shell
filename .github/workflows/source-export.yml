name: Apply Agent Patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    name: Apply patch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Check and apply patch
        shell: bash
        run: |
          if [ ! -f .agent-patch/READY ]; then
            echo "Patch is not ready"
            exit 0
          fi
          cat .agent-patch/part-* > /tmp/agent.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git apply --check /tmp/agent.patch 2> .agent-patch/error.txt; then
            git add .agent-patch/error.txt
            git commit -m "chore: record patch error"
            git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
            exit 1
          fi
          git apply --index /tmp/agent.patch
          git rm -r .agent-patch
          git commit -m "fix: isolate SFTP state by session"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
