name: Apply Agent Patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    name: Apply patch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply patch
        shell: bash
        run: |
          cat .agent-patch/part-* > /tmp/agent.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git apply --recount --check /tmp/agent.patch
          git apply --recount --index /tmp/agent.patch
          git rm -r .agent-patch
          git commit -m "fix: isolate SFTP state by session"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
