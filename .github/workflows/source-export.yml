name: Apply Agent Patch

on:
  push:
    branches:
      - fix/sftp-session-state-isolation

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    name: Apply patch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Apply and commit patch
        shell: bash
        run: |
          if [ ! -f .agent-patch/READY ]; then
            echo "Patch is not ready"
            exit 0
          fi
          cat .agent-patch/part-* > /tmp/agent.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git apply --index /tmp/agent.patch
          git rm -r .agent-patch
          git commit -m "fix: isolate SFTP state by session"
          git push origin "HEAD:${GITHUB_REF_NAME}"
