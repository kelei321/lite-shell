name: Source Export

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/upload-artifact@v4
        with:
          name: lite-shell-pr4-source
          path: |
            .
            !.git/**
            !node_modules/**
            !src-tauri/target/**
          include-hidden-files: true
          retention-days: 1
