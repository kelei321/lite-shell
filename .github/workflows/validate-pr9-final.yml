name: Validate PR9 final source

on:
  push:
    branches:
      - feat/sftp-directory-conflict-strategies
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-pr9-final
  cancel-in-progress: true

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feat/sftp-directory-conflict-strategies
      - uses: actions/setup-node@v5
        with:
          node-version: 24.16.0
          cache: npm
      - name: Set up Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable
      - name: Install dependencies
        run: npm ci
      - name: Type-check frontend
        run: npm run typecheck
      - name: Build frontend
        run: npm run build
      - name: Check Rust formatting
        run: npm run format:check
      - name: Run Rust tests
        run: npm run test
      - name: Lint Rust correctness
        run: npm run lint
